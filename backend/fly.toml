# Fly.io config for refer-backend (plan.md M7).
# Deploy:  fly launch --no-deploy   (first time)
#          fly secrets set ANTHROPIC_API_KEY=... CROSSREF_POLITE_EMAIL=...
#          fly deploy
app = "refer-backend"
primary_region = "nrt"  # Tokyo — closest to Korean users

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
